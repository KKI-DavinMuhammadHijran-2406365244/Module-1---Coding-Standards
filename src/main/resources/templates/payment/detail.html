<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Payment Detail</title></head>
<body>
<h1>Payment Detail</h1>
<div th:if="${payment != null}">
    <p>ID: <span th:text="${payment.id}"></span></p>
    <p>Method: <span th:text="${payment.method}"></span></p>
    <p>Status: <span th:text="${payment.status}"></span></p>
    <p>Order ID: <span th:text="${payment.orderId}"></span></p>
</div>
<div th:if="${payment == null}">
    <p>Payment not found.</p>
</div>
</body>
</html>
