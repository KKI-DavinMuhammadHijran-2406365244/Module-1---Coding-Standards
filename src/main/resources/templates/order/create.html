<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Create Order</title></head>
<body>
<h1>Create Order</h1>
<form th:action="@{/order/create}" th:object="${order}" method="post">
    <label>Author: <input type="text" th:field="*{author}"/></label><br/>
    <label>Total Price: <input type="number" th:field="*{totalPrice}"/></label><br/>
    <button type="submit">Create</button>
</form>
</body>
</html>
